# Nexus 发布工作流
# 负责构建多平台安装包并创建 GitHub Release

name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '发布版本号 (例如: v1.0.0)'
        required: true
        type: string

env:
  NODE_VERSION: '20'
  RUST_VERSION: '1.75'

jobs:
  # ============================================
  # 准备发布
  # ============================================
  prepare:
    name: 准备发布
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.version.outputs.tag }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 确定版本号
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            VERSION="${{ github.event.inputs.version }}"
          else
            VERSION="${GITHUB_REF#refs/tags/}"
          fi
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag=$VERSION" >> $GITHUB_OUTPUT
          echo "发布版本: $VERSION"

  # ============================================
  # 构建 Windows 安装包
  # ============================================
  build-windows:
    name: 构建 Windows 安装包
    runs-on: windows-latest
    needs: [prepare]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Nexus ${{ needs.prepare.outputs.version }}'
          releaseBody: '查看 CHANGELOG.md 了解详细信息'
          releaseDraft: true
          prerelease: false
          args: --target x86_64-pc-windows-msvc

      - name: 上传 Windows 安装包
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer
          path: |
            src-tauri/target/release/bundle/msi/*.msi
            src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 7

  # ============================================
  # 构建 macOS 安装包
  # ============================================
  build-macos:
    name: 构建 macOS 安装包
    runs-on: macos-latest
    needs: [prepare]
    strategy:
      fail-fast: false
      matrix:
        target: [x86_64-apple-darwin, aarch64-apple-darwin]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}
          targets: ${{ matrix.target }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Nexus ${{ needs.prepare.outputs.version }}'
          releaseBody: '查看 CHANGELOG.md 了解详细信息'
          releaseDraft: true
          prerelease: false
          args: --target ${{ matrix.target }}

      - name: 上传 macOS 安装包
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.target }}/release/bundle/macos/*.app
          retention-days: 7

  # ============================================
  # 构建 Linux 安装包
  # ============================================
  build-linux:
    name: 构建 Linux 安装包
    runs-on: ubuntu-22.04
    needs: [prepare]
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 安装系统依赖
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libgtk-3-dev \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev

      - name: 安装 Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: 安装 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      - name: 缓存 Cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: 安装前端依赖
        run: npm ci

      - name: 构建 Tauri 应用
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          TAURI_KEY_PASSWORD: ${{ secrets.TAURI_KEY_PASSWORD }}
        with:
          tagName: ${{ needs.prepare.outputs.tag }}
          releaseName: 'Nexus ${{ needs.prepare.outputs.version }}'
          releaseBody: '查看 CHANGELOG.md 了解详细信息'
          releaseDraft: true
          prerelease: false

      - name: 上传 Linux 安装包
        uses: actions/upload-artifact@v4
        with:
          name: linux-packages
          path: |
            src-tauri/target/release/bundle/deb/*.deb
            src-tauri/target/release/bundle/appimage/*.AppImage
          retention-days: 7

  # ============================================
  # 创建 GitHub Release
  # ============================================
  create-release:
    name: 创建 GitHub Release
    runs-on: ubuntu-latest
    needs: [prepare, build-windows, build-macos, build-linux]
    if: always()
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: 列出构建产物
        run: |
          echo "构建产物列表:"
          find artifacts -type f -name "*.msi" -o -name "*.exe" -o -name "*.dmg" -o -name "*.deb" -o -name "*.AppImage" | while read file; do
            echo "  - $(basename $file)"
          done

      - name: 生成发布说明
        id: release_notes
        run: |
          VERSION="${{ needs.prepare.outputs.version }}"
          cat << EOF > release_notes.md
          # Nexus ${VERSION}

          ## 下载

          ### Windows
          - \`Nexus_${VERSION}_x64-setup.exe\` - Windows 安装程序 (NSIS)
          - \`Nexus_${VERSION}_x64.msi\` - Windows MSI 安装包

          ### macOS
          - \`Nexus_${VERSION}_x64.dmg\` - macOS (Intel)
          - \`Nexus_${VERSION}_aarch64.dmg\` - macOS (Apple Silicon)

          ### Linux
          - \`Nexus_${VERSION}_amd64.deb\` - Debian/Ubuntu 包
          - \`Nexus_${VERSION}_x64.AppImage\` - AppImage 便携版

          ## 更新说明

          请查看 [CHANGELOG.md](./CHANGELOG.md) 了解详细更新内容。

          ## 系统要求

          - **Windows**: Windows 10 或更高版本
          - **macOS**: macOS 10.13 或更高版本
          - **Linux**: Ubuntu 20.04+ / Debian 11+ 或其他现代发行版

          ---

          > 如遇问题，请在 [Issues](../../issues) 中反馈。
          EOF
          echo "release_notes_file=release_notes.md" >> $GITHUB_OUTPUT

      - name: 创建 GitHub Release
        if: github.event_name == 'push'
        uses: softprops/action-gh-release@v1
        with:
          body_path: release_notes.md
          draft: true
          prerelease: false
          files: |
            artifacts/**/*.msi
            artifacts/**/*.exe
            artifacts/**/*.dmg
            artifacts/**/*.deb
            artifacts/**/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: 发布成功通知
        run: |
          echo "=========================================="
          echo "发布 ${{ needs.prepare.outputs.version }} 构建完成!"
          echo "=========================================="
          echo ""
          echo "请前往 GitHub Releases 页面审核并发布:"
          echo "${{ github.server_url }}/${{ github.repository }}/releases"
